services:
  api:
    image: duoshou/api:latest
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: always
    env_file: ../../.env.production
    depends_on:
      - redis
    networks:
      - internal

  web:
    image: duoshou/web:latest
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - internal

networks:
  internal:

volumes:
  redis-data:
