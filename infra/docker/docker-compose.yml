services:
  api:
    image: duoshou/api:latest
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: always
    env_file: ../../.env.production
    depends_on:
      - redis
    networks:
      - internal

  web:
    image: duoshou/web:latest
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        # Vite 把这两个值 embed 进 JS bundle(前端登录/会话要用),build 时必传。
        # 从 compose 自动读取的 .env 文件(放在 infra/docker/.env)或 shell 环境继承。
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - internal

networks:
  internal:

volumes:
  redis-data:
